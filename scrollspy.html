<!doctype html>
<html>
  <head>
    <title>Simple Scrollspy</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <style>
      #content {
        height: 400px;
        overflow-y: scroll;
      }

      .section {
        height: 400px;
        padding: 20px;
      }
    </style>
  </head>

  <body>
    <div class="container mt-4">
      <div class="row">
        <!-- Menu -->
        <div class="col-4">
          <div id="menu" class="list-group">
            <a class="list-group-item  active" href="#s1">Section 1</a>
            <a class="list-group-item" href="#s2">Section 2</a>
            <a class="list-group-item" href="#s3">Section 3</a>
            <a class="list-group-item " href="#s4">Section 4</a>
          </div>
        </div>

        <!-- Content -->
        <div class="col-8">
          <div
            id="content"
            data-bs-spy="scroll"
            data-bs-target="#menu"
            tabindex="0"
          >
            <div id="s1" class="section bg-primary text-white">
              <h4>Section 1</h4>
            </div>

            <div id="s2" class="section bg-warning">
              <h4>Section 2</h4>
            </div>

            <div id="s3" class="section bg-success text-white">
              <h4>Section 3</h4>
            </div>

            <div id="s4" class="section bg-danger text-white">
              <h4>Section 4</h4>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
